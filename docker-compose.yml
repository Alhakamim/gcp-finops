services:
  postgres:
    image: postgres:16-alpine
    container_name: gcp-finops-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: finops
      POSTGRES_PASSWORD: finops_secret_2026
      POSTGRES_DB: gcp_finops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gcp-finops-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://finops:finops_secret_2026@postgres:5432/gcp_finops
      JWT_SECRET: finops-jwt-secret-change-in-production
      NEXTAUTH_SECRET: finops-nextauth-secret

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gcp-finops-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

volumes:
  pgdata:
